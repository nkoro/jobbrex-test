version: '3.8'

services:
  # 1. THE AGENT FACTORY (n8n)
  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_SECURE_COOKIE=false
      - WEBHOOK_URL=http://localhost:5678
      # Link to Ollama on host
      - OLLAMA_HOST=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./n8n_data:/home/node/.n8n

  # 2. THE BRAIN (Qdrant Vector DB)
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_data:/qdrant/storage

  # 3. THE DASHBOARD (Langfuse)
  langfuse:
    image: langfuse/langfuse:latest
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://postgres:mysecretpassword@db:5432/postgres
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=mysecret  # Change this for production!
      - SALT=mysalt

  # 4. DASHBOARD DATABASE (Postgres)
  db:
    image: postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=mysecretpassword
      - POSTGRES_DB=postgres
    volumes:
      - ./langfuse_data:/var/lib/postgresql/data
